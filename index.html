                <label class="checkbox-item"><input type="checkbox" value="${g}" onchange="toggleFilter('groups', '${g}')"> ${g}</label>
            `).join('');

            if(schoolBox) schoolBox.innerHTML = uniqueSchools.map(s => `
                <label class="checkbox-item"><input type="checkbox" value="${s}" onchange="toggleFilter('schools', '${s}')"> ${s}</label>
            `).join('');

            if(rankBox) rankBox.innerHTML = uniqueRanks.map(r => `
                <label class="flex items-center gap-2 px-6 py-4 bg-gray-50 rounded-2xl cursor-pointer hover:bg-blue-100 transition border-2 border-transparent has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                    <input type="checkbox" value="${r}" onchange="toggleFilter('ranks', '${r}')" class="hidden"> 
                    <span class="font-black ${getRankTextColor(r)}">${r === '佳作' ? '佳作' : '第 ' + r}</span>
                </label>
            `).join('');

            const searchInput = document.getElementById('search-input');
            if(searchInput) searchInput.addEventListener('input', e => {
                currentFilters.text = e.target.value;
                render();
            });

            updateRanking();
            render();
        }

        function getRankTextColor(r) {
            if(r === "1") return "text-yellow-600";
            if(r === "2") return "text-gray-600 font-bold";
            if(r === "3") return "text-orange-600";
            return "text-blue-800";
        }

        function toggleFilter(type, value) {
            const index = currentFilters[type].indexOf(value);
            if (index > -1) currentFilters[type].splice(index, 1);
            else currentFilters[type].push(value);
            render();
        }

        function switchTab(tabId) {
            const viewRank = document.getElementById('view-rank');
            const viewList = document.getElementById('view-list');
            const tabRank = document.getElementById('tab-rank');
            const tabList = document.getElementById('tab-list');

            if(viewRank) viewRank.classList.toggle('hidden-view', tabId !== 'rank');
            if(viewList) viewList.classList.toggle('hidden-view', tabId !== 'list');
            if(tabRank) tabRank.classList.toggle('tab-active', tabId === 'rank');
            if(tabList) tabList.classList.toggle('tab-active', tabId === 'list');
            
            if(tabId === 'rank') updateRanking();
            else render();
        }

        function updateRanking() {
            const getPt = (id) => {
                const el = document.getElementById(id);
                return el ? (parseInt(el.value) || 0) : 0;
            }

            const ptsMap = {
                "1": getPt('pts-1'),
                "2": getPt('pts-2'),
                "3": getPt('pts-3'),
                "4": getPt('pts-4'),
                "5": getPt('pts-5'),
                "6": getPt('pts-6'),
                "佳作": getPt('pts-佳作')
            };
            
            const stats = {};
            data.forEach(d => {
                if(!stats[d.school]) stats[d.school] = { name: d.school, score: 0, gold: 0, total: 0 };
                stats[d.school].score += ptsMap[d.rank] || 0;
                stats[d.school].total++;
                if(d.rank === "1") stats[d.school].gold++;
            });

            const sorted = Object.values(stats).sort((a,b) => b.score - a.score || b.gold - a.gold);
            
            safeSetText('top-school-name', sorted[0]?.name || "無數據");
            safeSetText('total-students-rank', data.length);

            const rankingBox = document.getElementById('school-ranking-full');
            if(rankingBox) rankingBox.innerHTML = sorted.map((s, idx) => `
                <div class="p-8 flex items-center justify-between hover:bg-gray-50 transition cursor-pointer" onclick="quickFilterSchool('${s.name}')">
                    <div class="flex items-center gap-6">
                        <span class="w-16 h-16 flex items-center justify-center rounded-3xl text-2xl font-black ${idx < 3 ? 'bg-blue-600 text-white shadow-xl shadow-blue-200' : 'bg-gray-100 text-gray-400'}">
                            ${idx + 1}
                        </span>
                        <div>
                            <p class="font-black text-gray-900 text-3xl">${s.name}</p>
                            <p class="text-sm font-bold text-gray-400 mt-2 uppercase tracking-widest">
                                <span class="text-yellow-600 font-black"><i class="fas fa-crown"></i> ${s.gold} GOLD</span> / ${s.total} AWARDS
                            </p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-5xl font-black text-blue-800">${s.score}</p>
                        <p class="text-xs text-gray-300 font-bold uppercase tracking-[0.2em]">Points</p>
                    </div>
                </div>
            `).join('');
        }

        function render() {
            let filtered = data.filter(d => {
                const matchT = d.name.includes(currentFilters.text) || d.group.includes(currentFilters.text);
                const matchG = currentFilters.groups.length === 0 || currentFilters.groups.includes(d.group);
                const matchS = currentFilters.schools.length === 0 || currentFilters.schools.includes(d.school);
                const matchR = currentFilters.ranks.length === 0 || currentFilters.ranks.includes(d.rank);
                return matchT && matchG && matchS && matchR;
            });

            filtered.sort((a, b) => {
                let vA = a[sortConfig.key], vB = b[sortConfig.key];
                if(sortConfig.key === 'rank') {
                    const valMap = (v) => v === '佳作' ? 999 : parseInt(v);
                    vA = valMap(vA); vB = valMap(vB);
                }
                if(vA < vB) return sortConfig.direction === 'asc' ? -1 : 1;
                if(vA > vB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            safeSetText('current-count', filtered.length);

            const deskList = document.getElementById('award-list-desktop');
            const mobList = document.getElementById('award-list-mobile');
            const emptyState = document.getElementById('empty-state');

            if(filtered.length === 0) {
                if(deskList) deskList.innerHTML = '';
                if(mobList) mobList.innerHTML = '';
                if(emptyState) emptyState.classList.remove('hidden');
            } else {
                if(emptyState) emptyState.classList.add('hidden');
                
                if(deskList) deskList.innerHTML = filtered.map(d => `
                    <tr class="hover:bg-blue-50/30 transition border-b border-gray-50">
                        <td class="px-8 py-8"><span class="px-5 py-2 rounded-2xl text-sm font-black tracking-widest ${getRankStyle(d.rank)}">${d.rank === '佳作' ? '佳作' : '第 ' + d.rank}</span></td>
                        <td class="px-8 py-8 font-black text-gray-900 text-3xl">${d.name}</td>
                        <td class="px-8 py-8 text-gray-600 text-2xl font-bold">${d.school}</td>
                        <td class="px-8 py-8">
                            <span class="font-black text-blue-700 text-xl block">${d.group}</span>
                            <span class="text-xs text-gray-400 font-bold uppercase">${d.sub}</span>
                        </td>
                    </tr>
                `).join('');

                if(mobList) mobList.innerHTML = filtered.map(d => `
                    <div class="p-8 card-item bg-white flex items-center justify-between border-b border-gray-50">
                        <div class="flex items-center gap-6">
                            <div class="w-16 h-16 rounded-3xl flex items-center justify-center text-xl font-black ${getRankStyle(d.rank)}">
                                ${d.rank === '佳作' ? '佳' : d.rank}
                            </div>
                            <div>
                                <p class="text-2xl font-black text-gray-900">${d.name}</p>
                                <p class="text-base text-gray-400 font-bold uppercase tracking-widest">${d.school}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-base font-black text-blue-600 uppercase tracking-tighter">${d.group}</p>
                            <p class="text-xs text-gray-300 font-bold uppercase">${d.sub}</p>
                        </div>
                    </div>
                `).join('');
            }
            updateSortIcons();
        }

        function setSort(key) {
            if (sortConfig.key === key) sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            else { sortConfig.key = key; sortConfig.direction = 'asc'; }
            render();
        }

        function updateSortIcons() {
            ['rank', 'name', 'school', 'group'].forEach(k => {
                const dIcon = document.getElementById(`sort-${k}`);
                const mIcon = document.getElementById(`sort-${k}-m`);
                const active = sortConfig.key === k;
                const iconClass = active 
                    ? `fas fa-sort-${sortConfig.direction === 'asc' ? 'up' : 'down'} ml-2 text-blue-600 opacity-100` 
                    : `fas fa-sort ml-2 opacity-20`;
                if(dIcon) dIcon.className = iconClass;
                if(mIcon) mIcon.className = iconClass;
            });
        }

        function getRankStyle(r) {
            if(r === "1") return "rank-1 shadow-lg shadow-yellow-100";
            if(r === "2") return "rank-2 shadow-lg shadow-gray-100";
            if(r === "3") return "rank-3 shadow-lg shadow-orange-100";
            return "bg-blue-50 text-blue-800 border-2 border-blue-100";
        }

        function quickFilterSchool(school) {
            resetFilters();
            currentFilters.schools = [school];
            document.querySelectorAll('#school-multi input').forEach(input => {
                if(input.value === school) input.checked = true;
            });
            switchTab('list');
        }

        function resetFilters() {
            currentFilters = { text: '', groups: [], schools: [], ranks: [] };
            const searchInput = document.getElementById('search-input');
            if(searchInput) searchInput.value = '';
            document.querySelectorAll('input[type="checkbox"]').forEach(i => i.checked = false);
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
