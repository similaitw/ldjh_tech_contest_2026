<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114學年度宜蘭縣國中技藝競賽統計</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .rank-1 { background-color: #fef3c7; color: #92400e; }
        .rank-2 { background-color: #f3f4f6; color: #374151; }
        .rank-3 { background-color: #ffedd5; color: #9a3412; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- 標頭區 -->
        <header class="mb-10 text-center lg:text-left flex flex-col lg:flex-row items-center justify-between gap-6">
            <div>
                <h1 class="text-4xl font-black text-blue-900 tracking-tight flex items-center gap-3">
                    <i class="fas fa-award text-yellow-500"></i>
                    宜蘭縣 114 學年度國中技藝競賽
                </h1>
                <p class="text-gray-500 mt-2 font-medium">
                    <i class="fas fa-chart-line mr-1"></i> 全職群獲獎數據互動統計儀表板
                </p>
            </div>
            <div class="flex gap-4">
                <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">總獲獎人數</p>
                    <p id="total-awardees" class="text-2xl font-black text-blue-600">0</p>
                </div>
                <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">參與職群數</p>
                    <p id="total-groups" class="text-2xl font-black text-blue-600">11</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- 左側：積分排行榜與篩選 -->
            <div class="lg:col-span-4 space-y-6">
                <!-- 篩選器 -->
                <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100">
                    <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                        <i class="fas fa-filter text-blue-500"></i> 進階篩選
                    </h3>
                    <div class="space-y-4">
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-3.5 text-gray-300"></i>
                            <input type="text" id="search-input" placeholder="搜尋姓名、學校..." 
                                class="w-full pl-10 pr-4 py-3 bg-gray-50 border-0 rounded-xl focus:ring-2 focus:ring-blue-500 transition">
                        </div>
                        <select id="group-filter" class="w-full px-4 py-3 bg-gray-50 border-0 rounded-xl focus:ring-2 focus:ring-blue-500 appearance-none">
                            <option value="all">所有職群</option>
                        </select>
                    </div>
                </div>

                <!-- 排行榜 -->
                <div class="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden">
                    <div class="p-5 bg-gradient-to-r from-blue-600 to-indigo-700 text-white flex justify-between items-center">
                        <h2 class="font-black flex items-center gap-2 italic">
                            <i class="fas fa-trophy text-yellow-300"></i> SCHOOL RANKING
                        </h2>
                        <span class="text-xs font-bold opacity-80">依總積分排序</span>
                    </div>
                    <div id="school-ranking" class="max-h-[500px] overflow-y-auto scrollbar-hide divide-y divide-gray-50">
                        <!-- 動力生成內容 -->
                    </div>
                </div>
            </div>

            <!-- 右側：詳細清單 -->
            <div class="lg:col-span-8">
                <div class="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-gray-50 text-gray-400 text-xs font-black uppercase tracking-widest border-b">
                                    <th class="px-6 py-5">名次</th>
                                    <th class="px-6 py-5">獲獎學生</th>
                                    <th class="px-6 py-5">所屬學校</th>
                                    <th class="px-6 py-5">職群組別</th>
                                </tr>
                            </thead>
                            <tbody id="award-list" class="divide-y divide-gray-50">
                                <!-- 動力生成內容 -->
                            </tbody>
                        </table>
                    </div>
                    <div id="empty-state" class="hidden py-20 text-center">
                        <i class="fas fa-folder-open text-gray-200 text-6xl mb-4"></i>
                        <p class="text-gray-400 italic">找不到符合條件的資料</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 原始數據
        const data = [
            // 電機電子
            { school: "國華國中", name: "蕭○宸", rank: "1", group: "電機電子", sub: "電機組" },
            { school: "慈心華德福", name: "鄭○泰", rank: "2", group: "電機電子", sub: "電機組" },
            { school: "羅東國中", name: "黃○文", rank: "3", group: "電機電子", sub: "電機組" },
            { school: "東光國中", name: "黃○富", rank: "4", group: "電機電子", sub: "電機組" },
            { school: "人文國中小", name: "張○", rank: "5", group: "電機電子", sub: "電機組" },
            { school: "國華國中", name: "陳○毅", rank: "6", group: "電機電子", sub: "電機組" },

            { school: "中華國中", name: "簡○修", rank: "4", group: "電機電子", sub: "電子組" },
            { school: "冬山國中", name: "潘潔", rank: "5", group: "電機電子", sub: "電子組" },
            // 食品
            { school: "羅東國中", name: "李○穎", rank: "1", group: "食品", sub: "西點組" },
            { school: "復興國中", name: "蔣○妤", rank: "2", group: "食品", sub: "西點組" },
            { school: "羅東國中", name: "王潔", rank: "3", group: "食品", sub: "西點組" },
            { school: "文化國中", name: "林○臻", rank: "4", group: "食品", sub: "西點組" },
            { school: "宜蘭國中", name: "張○瑄", rank: "5", group: "食品", sub: "西點組" },
            { school: "宜蘭國中", name: "張珮", rank: "6", group: "食品", sub: "西點組" },
            { school: "順安國中", name: "李○齊", rank: "佳作", group: "食品", sub: "西點組" },
            { school: "東光國中", name: "邱○瞳", rank: "佳作", group: "食品", sub: "西點組" },
            { school: "內城國中小", name: "曾○蕙", rank: "佳作", group: "食品", sub: "西點組" },
            { school: "順安國中", name: "鄧婕", rank: "佳作", group: "食品", sub: "西點組" },
            { school: "中華國中", name: "李○峻", rank: "1", group: "食品", sub: "中點組" },
            { school: "中華國中", name: "楊○慧", rank: "2", group: "食品", sub: "中點組" },
            { school: "順安國中", name: "謝○歆", rank: "3", group: "食品", sub: "中點組" },
            { school: "羅東國中", name: "游○婷", rank: "4", group: "食品", sub: "中點組" },
            { school: "順安國中", name: "謝岑", rank: "5", group: "食品", sub: "中點組" },
            { school: "復興國中", name: "林玲", rank: "6", group: "食品", sub: "中點組" },
            { school: "吳沙國中", name: "張○辰", rank: "佳作", group: "食品", sub: "中點組" },
            { school: "羅東國中", name: "簡○晴", rank: "佳作", group: "食品", sub: "中點組" },
            { school: "國華國中", name: "林○晴", rank: "佳作", group: "食品", sub: "中點組" },
            // 設計
            { school: "中華國中", name: "陳○涵", rank: "1", group: "設計", sub: "設計職群" },
            { school: "壯圍國中", name: "林庭", rank: "2", group: "設計", sub: "設計職群" },
            { school: "壯圍國中", name: "賴○婕", rank: "3", group: "設計", sub: "設計職群" },
            { school: "中華國中", name: "李○樂", rank: "3", group: "設計", sub: "設計職群" },
            // 機械
            { school: "中華國中", name: "陳○煊", rank: "1", group: "機械", sub: "機械組" },
            { school: "羅東國中", name: "顏○祐", rank: "1", group: "機械", sub: "製圖組" },
            { school: "人文國中小", name: "蔡○翰", rank: "2", group: "機械", sub: "製圖組" },
            { school: "國華國中", name: "陳○捷", rank: "3", group: "機械", sub: "製圖組" },
            // 動力機械
            { school: "大同國中", name: "陳○庭", rank: "1", group: "動力機械", sub: "動力機械" },
            { school: "國華國中", name: "林○陞", rank: "2", group: "動力機械", sub: "動力機械" },
            { school: "羅東國中", name: "陳○峒", rank: "3", group: "動力機械", sub: "動力機械" },
            // 土木
            { school: "東光國中", name: "陳○羽", rank: "1", group: "土木建築", sub: "土木建築" },
            { school: "國華國中", name: "林淳", rank: "2", group: "土木建築", sub: "土木建築" },
            { school: "中華國中", name: "劉廷", rank: "3", group: "土木建築", sub: "土木建築" },
            // 家政
            { school: "壯圍國中", name: "林雨", rank: "1", group: "家政", sub: "美髮組" },
            { school: "凱旋國中", name: "李○晴", rank: "2", group: "家政", sub: "美髮組" },
            { school: "頭城國中", name: "顧○綵", rank: "3", group: "家政", sub: "美髮組" },
            { school: "壯圍國中", name: "林○萱", rank: "6", group: "家政", sub: "美髮組" },
            { school: "國華國中", name: "吳婉", rank: "1", group: "家政", sub: "美容組" },
            { school: "礁溪國中", name: "劉○", rank: "2", group: "家政", sub: "美容組" },
            { school: "凱旋國中", name: "陳恩", rank: "3", group: "家政", sub: "美容組" },
            // 餐旅
            { school: "頭城國中", name: "林○雯", rank: "1", group: "餐旅", sub: "餐旅組" },
            { school: "頭城國中", name: "胡琳", rank: "2", group: "餐旅", sub: "餐旅組" },
            { school: "內城國中小", name: "游○晴", rank: "3", group: "餐旅", sub: "餐旅組" },
            { school: "頭城國中", name: "莊○琳", rank: "4", group: "餐旅", sub: "餐旅組" },
            { school: "頭城國中", name: "林○陞", rank: "5", group: "餐旅", sub: "餐旅組" },
            { school: "壯圍國中", name: "游 毅", rank: "6", group: "餐旅", sub: "餐旅組" },
            // 商管
            { school: "吳沙國中", name: "翁○原", rank: "1", group: "商管", sub: "商管職群" },
            { school: "吳沙國中", name: "周○瑤", rank: "2", group: "商管", sub: "商管職群" },
            { school: "吳沙國中", name: "黃○婕", rank: "3", group: "商管", sub: "商管職群" },
            // 農業
            { school: "文化國中", name: "賴○蒨", rank: "1", group: "農業", sub: "農業職群" },
            { school: "東光國中", name: "林○豈", rank: "2", group: "農業", sub: "農業職群" },
            { school: "東光國中", name: "莊○晴", rank: "3", group: "農業", sub: "農業職群" },
            // 醫護
            { school: "壯圍國中", name: "朱恩", rank: "1", group: "醫護", sub: "醫護組" },
            { school: "順安國中", name: "賴○羽", rank: "2", group: "醫護", sub: "醫護組" },
            { school: "東光國中", name: "林妤", rank: "3", group: "醫護", sub: "醫護組" },
            { school: "壯圍國中", name: "黃○旭", rank: "4", group: "醫護", sub: "醫護組" },
            { school: "岳明國中小", name: "許○羚", rank: "5", group: "醫護", sub: "醫護組" },
            { school: "壯圍國中", name: "簡○妘", rank: "6", group: "醫護", sub: "醫護組" }
        ];

        const rankPoints = { "1": 10, "2": 8, "3": 6, "4": 4, "5": 3, "6": 2, "佳作": 1 };

        // 初始化狀態
        let currentFilter = { text: '', group: 'all', school: 'all' };

        // DOM 元素
        const awardList = document.getElementById('award-list');
        const schoolRanking = document.getElementById('school-ranking');
        const groupFilter = document.getElementById('group-filter');
        const searchInput = document.getElementById('search-input');
        const emptyState = document.getElementById('empty-state');
        const totalAwardeesLabel = document.getElementById('total-awardees');

        // 計算學校排名
        function updateRanking() {
            const stats = {};
            data.forEach(item => {
                if (!stats[item.school]) stats[item.school] = { name: item.school, score: 0, gold: 0 };
                stats[item.school].score += rankPoints[item.rank] || 0;
                if (item.rank === "1") stats[item.school].gold += 1;
            });

            const sorted = Object.values(stats).sort((a, b) => b.score - a.score);
            
            schoolRanking.innerHTML = sorted.map((s, idx) => `
                <div class="p-4 hover:bg-blue-50 transition flex items-center justify-between cursor-pointer" onclick="filterBySchool('${s.name}')">
                    <div class="flex items-center gap-3">
                        <span class="w-6 text-xs font-black text-gray-300">${idx + 1}</span>
                        <div>
                            <p class="font-bold text-gray-800">${s.name}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tight">${s.gold} GOLD AWARDS</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black text-blue-700">${s.score}</p>
                        <p class="text-[9px] text-gray-300 font-bold uppercase">Points</p>
                    </div>
                </div>
            `).join('');
        }

        // 更新篩選器選單
        function initFilters() {
            const groups = [...new Set(data.map(d => d.group))].sort();
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                groupFilter.appendChild(opt);
            });
        }

        // 渲染清單
        function renderList() {
            const filtered = data.filter(item => {
                const matchText = item.name.includes(currentFilter.text) || item.school.includes(currentFilter.text);
                const matchGroup = currentFilter.group === 'all' || item.group === currentFilter.group;
                const matchSchool = currentFilter.school === 'all' || item.school === currentFilter.school;
                return matchText && matchGroup && matchSchool;
            });

            totalAwardeesLabel.textContent = filtered.length;

            if (filtered.length === 0) {
                awardList.innerHTML = '';
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                awardList.innerHTML = filtered.map(item => `
                    <tr class="hover:bg-gray-50 transition group">
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-lg text-xs font-black tracking-tighter ${getRankClass(item.rank)}">
                                ${item.rank === '佳作' ? '佳作' : '第 ' + item.rank}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-500 text-xs">
                                    <i class="fas fa-user"></i>
                                </div>
                                <span class="font-bold text-gray-700">${item.name}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm font-medium text-gray-500">${item.school}</td>
                        <td class="px-6 py-4">
                            <div class="flex flex-col">
                                <span class="text-xs font-bold text-blue-600">${item.group}</span>
                                <span class="text-[10px] text-gray-400 uppercase font-bold">${item.sub}</span>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function getRankClass(rank) {
            if (rank === "1") return "rank-1";
            if (rank === "2") return "rank-2";
            if (rank === "3") return "rank-3";
            return "bg-blue-50 text-blue-600";
        }

        function filterBySchool(school) {
            currentFilter.school = (currentFilter.school === school) ? 'all' : school;
            renderList();
        }

        // 事件監聽
        searchInput.addEventListener('input', (e) => {
            currentFilter.text = e.target.value;
            renderList();
        });

        groupFilter.addEventListener('change', (e) => {
            currentFilter.group = e.target.value;
            renderList();
        });

        // 啟動
        window.onload = () => {
            updateRanking();
            initFilters();
            renderList();
        };
    </script>
</body>
</html>
