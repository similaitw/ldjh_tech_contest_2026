        let sortConfig = { key: 'rank', direction: 'asc' };

        // 分頁控制
        function switchTab(tabId) {
            activeTab = tabId;
            Object.keys(views).forEach(k => {
                views[k].classList.toggle('hidden-view', k !== tabId);
                tabs[k].classList.toggle('tab-active', k === tabId);
                tabs[k].classList.toggle('text-gray-500', k !== tabId);
            });
            if(tabId === 'rank') updateRanking();
            else render();
        }

        const views = { rank: document.getElementById('view-rank'), list: document.getElementById('view-list') };
        const tabs = { rank: document.getElementById('tab-rank'), list: document.getElementById('tab-list') };

        // 初始化
        function init() {
            const groups = [...new Set(data.map(d => d.group))].sort();
            const schools = [...new Set(data.map(d => d.school))].sort();
            const gSel = document.getElementById('group-filter');
            const sSel = document.getElementById('school-filter');

            groups.forEach(g => gSel.add(new Option(g, g)));
            schools.forEach(s => sSel.add(new Option(s, s)));

            document.getElementById('search-input').addEventListener('input', e => { currentFilter.text = e.target.value; render(); });
            gSel.addEventListener('change', e => { currentFilter.group = e.target.value; render(); });
            sSel.addEventListener('change', e => { currentFilter.school = e.target.value; render(); });

            document.getElementById('total-students-rank').textContent = data.length;
            updateRanking();
            updateSortIcons();
            render();
        }

        // 學校排行榜渲染

            const stats = {};
            data.forEach(d => {
                if(!stats[d.school]) stats[d.school] = { name: d.school, score: 0, gold: 0, count: 0 };
                stats[d.school].score += rankPoints[d.rank] || 0;
                stats[d.school].count++;
                if(d.rank === "1") stats[d.school].gold++;
            });

            const sorted = Object.values(stats).sort((a,b) => b.score - a.score);
            document.getElementById('top-school-name').textContent = sorted[0].name;

                        </span>
                        <div>
                            <p class="font-black text-gray-900 text-xl">${s.name}</p>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-tighter mt-1">
                                <span class="text-yellow-600 font-black"><i class="fas fa-crown"></i> ${s.gold} 金牌</span> / 總計 ${s.count} 人獲獎
                            </p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-3xl font-black text-blue-700">${s.score}</p>
                        <p class="text-[10px] text-gray-300 font-bold uppercase tracking-widest">Points Total</p>
                    </div>
                </div>
            `).join('');
        }

        // 明細列表渲染 (含排序邏輯)
        function render() {
            // 1. 先篩選
            let filtered = data.filter(d => {
                const matchT = d.name.includes(currentFilter.text) || d.school.includes(currentFilter.text);
                const matchG = currentFilter.group === 'all' || d.group === currentFilter.group;
                const matchS = currentFilter.school === 'all' || d.school === currentFilter.school;
                return matchT && matchG && matchS;
            });

            // 2. 再針對「當前結果」排序
            filtered.sort((a, b) => {
                let vA = a[sortConfig.key], vB = b[sortConfig.key];
                
                // 特別處理名次 (1-6 數字優先於佳作)
                if(sortConfig.key === 'rank') {
                    const r = (v) => v === '佳作' ? 999 : parseInt(v);
                    vA = r(vA); vB = r(vB);
                }
                
                if(vA < vB) return sortConfig.direction === 'asc' ? -1 : 1;
                if(vA > vB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            document.getElementById('current-count').textContent = filtered.length;

            if(filtered.length === 0) {
                document.getElementById('award-list-desktop').innerHTML = document.getElementById('award-list-mobile').innerHTML = '';
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                
                // 電腦版表格
                document.getElementById('award-list-desktop').innerHTML = filtered.map(d => `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-50">
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 rounded-lg text-xs font-black tracking-widest ${getRankStyle(d.rank)}">
                                ${d.rank === '佳作' ? '佳作' : '第 ' + d.rank}
                            </span>
                        </td>
                        <td class="px-8 py-6 font-black text-gray-900 text-lg">${d.name}</td>
                        <td class="px-8 py-6 text-gray-600 text-base font-bold">${d.school}</td>
                        <td class="px-8 py-6">
                            <span class="font-black text-blue-700 text-sm block">${d.group}</span>
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-tight">${d.sub}</span>
                        </td>
                    </tr>
                `).join('');

                // 手機版卡片
                document.getElementById('award-list-mobile').innerHTML = filtered.map(d => `
                    <div class="p-5 card-item bg-white flex items-center justify-between border-b border-gray-50">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-sm font-black ${getRankStyle(d.rank)}">
                                ${d.rank === '佳作' ? '佳' : d.rank}
                            </div>
                            <div>
                                <p class="text-lg font-black text-gray-900">${d.name}</p>
                                <p class="text-xs text-gray-400 font-bold uppercase tracking-tight">${d.school}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black text-blue-600 uppercase tracking-tighter">${d.group}</p>
                            <p class="text-[10px] text-gray-300 font-bold uppercase">${d.sub}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        // 排序設定切換
        function setSort(key) {
            if (sortConfig.key === key) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.direction = 'asc';
            }
            updateSortIcons();
            render(); // 重新渲染列表
        }

        function updateSortIcons() {
            ['rank', 'name', 'school', 'group'].forEach(k => {
                const iconClass = sortConfig.key === k 
                    ? `fas fa-sort-${sortConfig.direction === 'asc' ? 'up' : 'down'} text-blue-600 opacity-100` 
                    : `fas fa-sort opacity-20`;
                
                const dIcon = document.getElementById(`sort-${k}`);
                const mIcon = document.getElementById(`sort-${k}-m`);
                if(dIcon) dIcon.className = iconClass;
                if(mIcon) mIcon.className = iconClass;
            });
        }

        function getRankStyle(r) {
            if(r === "1") return "rank-1";
            if(r === "2") return "rank-2";
            if(r === "3") return "rank-3";
            return "bg-blue-50 text-blue-800";
        }

        // 點擊排行榜學校可跳轉並篩選
        function quickViewSchool(school) {
            currentFilter.school = school;
            document.getElementById('school-filter').value = school;
            switchTab('list');
        }

        function resetFilters() {
            currentFilter = { text: '', group: 'all', school: 'all' };
            document.getElementById('search-input').value = '';
            document.getElementById('group-filter').value = 'all';
            document.getElementById('school-filter').value = 'all';
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
