        .tab-active { color: #2563eb; border-bottom: 4px solid #2563eb; }
        
        /* 動畫轉場 */
        .page-view { transition: opacity 0.3s ease; }

            { school: "壯圍國中", name: "簡○妘", rank: "6", group: "醫護", sub: "醫護組" }

        const rankPoints = { "1": 10, "2": 8, "3": 6, "4": 4, "5": 3, "6": 2, "佳作": 1 };

        // 狀態
        let activeTab = 'rank';
        let currentFilter = { text: '', group: 'all', school: 'all' };
        let sortConfig = { key: 'rank', direction: 'asc' };

        // DOM
        const views = { rank: document.getElementById('view-rank'), list: document.getElementById('view-list') };
        const tabs = { rank: document.getElementById('tab-rank'), list: document.getElementById('tab-list') };

        // 分頁切換
        function switchTab(tabId) {
            activeTab = tabId;
            Object.keys(views).forEach(k => {
                views[k].classList.toggle('hidden-view', k !== tabId);
                tabs[k].classList.toggle('tab-active', k !== tabId ? false : true);
                tabs[k].classList.toggle('text-gray-400', k !== tabId);
            });
            if(tabId === 'rank') updateRanking();
            else render();
        }

        // 初始化
        function init() {
            const groups = [...new Set(data.map(d => d.group))].sort();
            const schools = [...new Set(data.map(d => d.school))].sort();
            const gSel = document.getElementById('group-filter');
            const sSel = document.getElementById('school-filter');

            groups.forEach(g => gSel.add(new Option(g, g)));
            schools.forEach(s => sSel.add(new Option(s, s)));

            document.getElementById('search-input').addEventListener('input', e => { currentFilter.text = e.target.value; render(); });
            gSel.addEventListener('change', e => { currentFilter.group = e.target.value; render(); });
            sSel.addEventListener('change', e => { currentFilter.school = e.target.value; render(); });

            document.getElementById('total-students-rank').textContent = data.length;
            updateRanking();
            updateSortIcons();
        }

        // 學校排行更新
        function updateRanking() {
            const stats = {};
            data.forEach(d => {
                if(!stats[d.school]) stats[d.school] = { name: d.school, score: 0, gold: 0, count: 0 };
                stats[d.school].score += rankPoints[d.rank] || 0;
                stats[d.school].count++;
                if(d.rank === "1") stats[d.school].gold++;
            });

            const sorted = Object.values(stats).sort((a,b) => b.score - a.score);
            document.getElementById('top-school-name').textContent = sorted[0].name;

            document.getElementById('school-ranking-full').innerHTML = sorted.map((s, idx) => `
                <div class="p-6 flex items-center justify-between hover:bg-gray-50 transition cursor-pointer" onclick="quickViewSchool('${s.name}')">
                    <div class="flex items-center gap-4">
                        <span class="w-8 h-8 flex items-center justify-center rounded-full text-xs font-black ${idx < 3 ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-400'}">
                            ${idx + 1}
                        </span>
                        <div>
                            <p class="font-black text-gray-800">${s.name}</p>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">
                                <span class="text-yellow-500">${s.gold} 金牌</span> / 總計 ${s.count} 人獲獎
                            </p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black text-blue-700">${s.score}</p>
                        <p class="text-[9px] text-gray-300 font-bold uppercase tracking-widest">Points Total</p>
                    </div>
                </div>
            `).join('');
        }

        // 明細渲染
        function render() {
            let filtered = data.filter(d => {
                const matchT = d.name.includes(currentFilter.text) || d.school.includes(currentFilter.text);
                const matchG = currentFilter.group === 'all' || d.group === currentFilter.group;
                const matchS = currentFilter.school === 'all' || d.school === currentFilter.school;
                return matchT && matchG && matchS;
            });

            filtered.sort((a, b) => {
                let vA = a[sortConfig.key], vB = b[sortConfig.key];
                if(sortConfig.key === 'rank') {
                    const r = (v) => v === '佳作' ? 999 : parseInt(v);
                    vA = r(vA); vB = r(vB);
                }
                if(vA < vB) return sortConfig.direction === 'asc' ? -1 : 1;
                if(vA > vB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            document.getElementById('current-count').textContent = filtered.length;

            if(filtered.length === 0) {
                document.getElementById('award-list-desktop').innerHTML = document.getElementById('award-list-mobile').innerHTML = '';
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('award-list-desktop').innerHTML = filtered.map(d => `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4"><span class="px-2 py-0.5 rounded text-[10px] font-black ${getRankStyle(d.rank)}">${d.rank === '佳作' ? '佳作' : '第 ' + d.rank}</span></td>
                        <td class="px-6 py-4 font-bold text-gray-800 text-sm">${d.name}</td>
                        <td class="px-6 py-4 text-gray-500 text-xs">${d.school}</td>
                        <td class="px-6 py-4 font-bold text-blue-600 text-xs">${d.group} <span class="text-[9px] text-gray-300 block font-medium uppercase">${d.sub}</span></td>
                    </tr>
                `).join('');

                document.getElementById('award-list-mobile').innerHTML = filtered.map(d => `
                    <div class="p-4 card-item bg-white flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center text-xs font-black ${getRankStyle(d.rank)}">
                                ${d.rank === '佳作' ? '佳' : d.rank}
                            </div>
                            <div>
                                <p class="text-sm font-black text-gray-800">${d.name}</p>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tight">${d.school}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-blue-600 uppercase">${d.group}</p>
                            <p class="text-[9px] text-gray-300 font-bold uppercase">${d.sub}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        function setSort(key) {
            if (sortConfig.key === key) sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            else { sortConfig.key = key; sortConfig.direction = 'asc'; }
            updateSortIcons();
            render();
        }

        function updateSortIcons() {
            ['rank', 'name', 'school', 'group'].forEach(k => {
                const iconClass = sortConfig.key === k ? `fas fa-sort-${sortConfig.direction === 'asc' ? 'up' : 'down'} text-blue-500 opacity-100` : `fas fa-sort opacity-30`;
                if(document.getElementById(`sort-${k}`)) document.getElementById(`sort-${k}`).className = iconClass;
                if(document.getElementById(`sort-${k}-m`)) document.getElementById(`sort-${k}-m`).className = iconClass;
            });
        }

        function getRankStyle(r) {
            if(r === "1") return "rank-1";
            if(r === "2") return "rank-2";
            if(r === "3") return "rank-3";
            return "bg-blue-50 text-blue-600";
        }

        function quickViewSchool(school) {
            currentFilter.school = school;
            document.getElementById('school-filter').value = school;
            switchTab('list');
        }

        function resetFilters() {
            currentFilter = { text: '', group: 'all', school: 'all' };
            document.getElementById('search-input').value = '';
            document.getElementById('group-filter').value = 'all';
            document.getElementById('school-filter').value = 'all';
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
